<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <defs>
    <linearGradient id="wingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#49B1F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 左上翅膀 -->
  <path d="M50,50 Q30,20 10,25 Q5,35 15,45 Q30,55 50,50" fill="url(#wingGradient)" opacity="0.9"/>
  
  <!-- 右上翅膀 -->
  <path d="M50,50 Q70,20 90,25 Q95,35 85,45 Q70,55 50,50" fill="url(#wingGradient)" opacity="0.9"/>
  
  <!-- 左下翅膀 -->
  <path d="M50,50 Q25,65 15,80 Q20,90 35,85 Q48,75 50,50" fill="url(#wingGradient)" opacity="0.8"/>
  
  <!-- 右下翅膀 -->
  <path d="M50,50 Q75,65 85,80 Q80,90 65,85 Q52,75 50,50" fill="url(#wingGradient)" opacity="0.8"/>
  
  <!-- 身体 -->
  <ellipse cx="50" cy="52" rx="3" ry="18" fill="#2d3748"/>
  
  <!-- 头部 -->
  <circle cx="50" cy="34" r="5" fill="#2d3748"/>
  
  <!-- 触角 -->
  <path d="M47,31 Q44,24 42,22" stroke="#2d3748" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M53,31 Q56,24 58,22" stroke="#2d3748" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- 翅膀纹理装饰 -->
  <circle cx="28" cy="35" r="3" fill="white" opacity="0.6"/>
  <circle cx="72" cy="35" r="3" fill="white" opacity="0.6"/>
  <circle cx="26" cy="75" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="74" cy="75" r="2.5" fill="white" opacity="0.5"/>
</svg>
